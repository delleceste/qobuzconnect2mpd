

# qobuzconnect2mpd configuration

###########################################################################
# qconnect2mpd — Qobuz Connect receiver daemon
#
# Run alongside upmpdcli to let the Qobuz mobile/desktop app cast audio
# directly to this device (similar to Spotify Connect).
# Start the daemon with:  qconnect2mpd [-c /etc/upmpdcli.conf]
###########################################################################

# Device name shown in the Qobuz app.
# Defaults to the value of 'friendlyname'.
qconnectfriendlyname = UpMpd Qobuz Connect

# Device type integer.  1=Speaker (default), 2=TV, 3=Phone, 4=Receiver
#qconnectdevicetype = 1

# TCP port for the HTTP device-endpoint server (the Qobuz app connects here).
qconnectport = 9093

# Stream format id.  5=MP3-320, 6=FLAC-lossless, 7=HiRes-96kHz, 27=HiRes-192kHz
# Defaults to qobuzformatid if set, otherwise 27.
qconnectformatid = 27

# Network interface for mDNS announcements (empty = auto-detect first
# non-loopback interface).
#qconnectiface =

# Unix socket path for IPC coordination with upmpdcli.
# When upmpdcli starts playing via UPnP it sends STOP to this socket;
# qconnect2mpd notifies upmpdcli with PLAYING/STOPPED events.
#qconnectsockpath = /var/run/upmpdcli-qconnect.sock

# Qobuz credentials for qconnect2mpd.  If not set, the values of
# qobuzuser/qobuzpass/qobuzappid/qobuzcfvalue are used instead.
qconnectuser = delleceste@gmail.com
qconnectpass = calimeraB3ll4
#qconnectappid =
#qconnectcfvalue =

